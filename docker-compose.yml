version: '3.9'

services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: edusphere-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - APP_NAME=EduSphere
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=http://localhost
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-edusphere}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    networks:
      - edusphere

  mysql:
    image: mysql:8.0
    container_name: edusphere-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-edusphere}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_USER: ${DB_USERNAME:-edusphere}
    volumes:
      - ./storage/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - edusphere

  redis:
    image: redis:7-alpine
    container_name: edusphere-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - edusphere

  nginx:
    image: nginx:alpine
    container_name: edusphere-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - edusphere

  mailpit:
    image: axllent/mailpit:latest
    container_name: edusphere-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - edusphere

networks:
  edusphere:
    driver: bridge
